{% extends "partials/base.html" %}
{% block content %}

<style>
.ai-card {
    border-radius: 12px;
}

.ai-result {
    background: #f8f9fa;
    border-left: 4px solid #b78d65;
    border-radius: 10px;
}
</style>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1>AI Interior Design Assistant</h1>
        <p class="text-muted">Get instant room design suggestions</p>
    </div>

    <div class="row justify-content-center">

        <div class="col-lg-6">
            <div class="ai-card shadow p-4">

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Room Type</label>
                        <input name="room" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Budget</label>
                        <select name="budget" class="form-control" required>
                            <option value="">Select</option>
                            <option>Low</option>
                            <option>Medium</option>
                            <option>High</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Style</label>
                        <select name="style" class="form-control" required>
                            <option value="">Select</option>
                            <option>Modern</option>
                            <option>Luxury</option>
                            <option>Minimal</option>
                        </select>
                    </div>

                    <button class="btn btn-primary w-100">
                        Generate Design
                    </button>

                </form>

            </div>
        </div>

    </div>

    {% if result %}
    <div class="row justify-content-center mt-5">
        <div class="col-lg-8">
            <div class="ai-result p-4 shadow-sm">
                <h5>✨ AI Suggestions</h5>
                <pre style="white-space: pre-line;">{{ result }}</pre>
            </div>
        </div>
    </div>
    {% endif %}

</div>

{% endblock %}
