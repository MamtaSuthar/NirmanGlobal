{% for project in projects %}
<div class="col-lg-4 col-md-6 col-sm-12 p-0 portfolio-item {{ project.status }}">
    
    <div class="position-relative overflow-hidden">

        <div class="portfolio-img d-flex align-items-center justify-content-center">
            <img class="img-fluid" src="{{ project.cover_image.url }}" alt="{{ project.title }}">
        </div>

        <div class="portfolio-text bg-secondary d-flex flex-column align-items-center justify-content-center">
            <h4 class="text-white mb-3">{{ project.title }}</h4>

            <div class="d-flex">
                <a class="btn btn-outline-primary m-1" href="{% url 'project_details' project.slug %}">
                    <i class="fa fa-link"></i>
                </a>

                <a class="btn btn-outline-primary m-1" href="{{ project.cover_image.url }}">
                    <i class="fa fa-eye"></i>
                </a>
            </div>
        </div>

    </div>

</div>
{% empty %}
<p class="text-center w-100">No Projects Found</p>
{% endfor %}
