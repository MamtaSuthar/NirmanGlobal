{% extends "partials/base.html" %}

{% block content %}
{% load static %}

<div class="text-center mb-5">
    <h1>Some Of Our Awesome Interior Designing Projects</h1>

    <div class="mb-4">
        <a href="?">All</a>
        <a href="?status=complete">Complete</a>
        <a href="?status=running">Running</a>
        <a href="?status=upcoming">Upcoming</a>
    </div>
</div>

<div class="row">
    {% for project in projects %}
    <div class="col-lg-4 col-md-6 mb-4">
        <div class="project-item position-relative">

            <img src="{{ project.cover_image.url }}" class="img-fluid">

            <div class="overlay">
                <h5>
                    <a href="{% url 'project_details' project.slug %}">
                        {{ project.title }}
                    </a>
                </h5>
            </div>

        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
